name: Miden 9-Minute Health Monitor

on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping Miden Network
        id: check_node
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.testnet.miden.io)
          if [ "$RESPONSE" -ne 200 ]; then
            exit 1
          fi

      - name: Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 **Miden Alert: Node Unreachable** 🚨
            Check the node logs immediately!
            
