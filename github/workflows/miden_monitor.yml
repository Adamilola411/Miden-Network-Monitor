name: Miden 9-Minute Health Monitor

on:
  schedule:
    - cron: '*/9 * * * *'  # Runs every 9 minutes
  workflow_dispatch:      # Allows you to trigger it manually

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Ping Miden Network
        id: check_node
        run: |
          # Pinging the Miden Testnet RPC
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.testnet.miden.io)
          
          if [ "$RESPONSE" -ne 200 ]; then
            echo "Node is DOWN with status: $RESPONSE"
            exit 1
          else
            echo "Node is UP and running."
          fi

      - name: Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 **Miden Alert: Node Unreachable** 🚨
            
            **Event:** 9-minute automated health check
            **Status:** Failed to reach RPC
            **Action:** Please check the Miden Node or Network status.
            
            🔗 [View logs on GitHub](https://github.com/${{ github.repository }}/actions)

      - name: Notify Success (Optional)
        # Uncomment the line below if you want a message every 9 minutes even if it works
        # if: success() 
        if: false 
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: "✅ Miden Check: All systems operational."
          
