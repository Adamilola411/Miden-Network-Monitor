name: Miden Health Monitor

on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  check-rpc:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Miden RPC
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.testnet.miden.io)
          echo "Current Status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then exit 1; fi

      - name: Send Test Message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ **Connection Successful!**
            Damilola, your Miden Monitor is now linked to GitHub. 
            It will check the network every 9 minutes.
