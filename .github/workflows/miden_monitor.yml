name: Miden Fixed-Interval Health Monitor

on:
  schedule:
    - cron: '7,17,27,37,47,57 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Miden RPC
        run: |
          RPC=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.testnet.miden.io)
          echo "RPC_STATUS=$RPC" >> $GITHUB_ENV
          if [ "$RPC" -ne 200 ]; then exit 1; fi

      - name: Notify Telegram on Failure
        if: failure() # <--- THIS ensures it ONLY notifies when the RPC is down
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -d "parse_mode=Markdown" \
            -d "text=🚨 *Miden Service Alert*%0A%0A*Status:* RPC Unreachable (Code: ${{ env.RPC_STATUS }})%0A*Schedule:* 10-minute cycle%0A*Time:* $(date -u +'%H:%M:%S') UTC%0A🔗 [View Logs](https://github.com/${{ github.repository }}/actions)"
            
