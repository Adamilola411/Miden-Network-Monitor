name: Miden 9-Minute Health Monitor

on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Miden RPC
        id: status
        run: |
          # We focus on the RPC Node as it is the most stable metric
          RPC=$(curl -s -o /dev/null -w "%{http_code}" https://rpc.testnet.miden.io)
          echo "RPC_STATUS=$RPC" >> $GITHUB_ENV
          echo "RPC Node Status: $RPC"
          
          if [ "$RPC" -ne 200 ]; then
            exit 1
          fi

      - name: Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            🚨 **Miden Node Alert** 🚨
            The RPC Node is unresponsive.
            **Status Code:** ${{ env.RPC_STATUS }}
            🔗 [Check Logs](https://github.com/${{ github.repository }}/actions)
